<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Links</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;

    background:url("bg.jpg") center/cover no-repeat fixed;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}


.container{
    width:340px;
    padding:40px;
    border-radius:16px;
    text-align:center;

    background:rgba(255,255,255,0.35);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.4);
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

h1{
    margin-bottom:30px;
    font-weight:600;
    color:#111;
}

.link{
    display:block;
    padding:14px;
    margin:12px 0;
    border-radius:10px;
    text-decoration:none;
    color:#111;

    background:rgba(255,255,255,0.5);
    border:1px solid rgba(255,255,255,0.6);

    transition:0.25s;
}


.spotify:hover{
    background:#1DB954;
    color:white;
}


.twitter:hover{
    background:#1DA1F2;
    color:white;
}


.reddit:hover{
    background:#FF4500;
    color:white;
}


.xbox:hover{
    background:#107C10;
    color:white;
}

.note{
    font-size:12px;
    color:#444;
}
</style>

</head>

<body>

<div class="container">

<h1>リンク一覧</h1>

<a class="link spotify" href="https://open.spotify.com/user/31rkde6vy3lcszyefhbi33dkgthm">
Spotify
</a>

<a class="link twitter" href="https://x.com/aaaaaamuuaarere">
Twitter
</a>

<a class="link reddit" href="https://www.reddit.com/user/aaaaaaaaaaamuuaarere/">
Reddit
<div class="note">※現在BAN</div>
</a>

<a class="link xbox" href="https://www.xbox.com/ja-JP/play/user/muuaanium">
Xbox
</a>

</div>

</body>
</html>
